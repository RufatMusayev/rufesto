# One image, both environments. Stack isolation is by host port + Cloudflare Tunnel
# routing (rufesto.* -> r_rufesto:8090, rufat-server.* -> p_rufesto:8080), NOT by which
# hostnames nginx knows. Knowing all four hostnames means the SAME image runs in either
# stack; nginx only decides consumer-vs-resto within whichever stack receives the request.

# ---- Consumer SPA: prod (rufesto.com) + preview (rufat-server.com) ----
server {
    listen 80 default_server;
    server_name rufesto.com www.rufesto.com rufat-server.com www.rufat-server.com;

    root /usr/share/nginx/html/client;
    index index.html;

    location /api {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
}

# ---- Resto dashboard SPA: prod (resto.rufesto.com) + preview (resto.rufat-server.com) ----
server {
    listen 80;
    server_name resto.rufesto.com resto.rufat-server.com;

    root /usr/share/nginx/html/resto;
    index index.html;

    location /api {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
}
