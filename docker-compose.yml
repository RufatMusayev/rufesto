# Project name comes from the deploy command, NOT this file:
#   real    site (rufesto.com)      -> docker compose -p r_rufesto --env-file .env.prod    up -d --build
#   preview site (rufat-server.com) -> docker compose -p p_rufesto --env-file .env.preview up -d --build
# Each stack binds its own host port (WEB_PORT) so the two never collide on :80.
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ./server
    environment:
      - PORT=3001
      # No default: each env MUST set CORS_ORIGIN so prod never trusts preview origins (or vice-versa).
      - CORS_ORIGIN=${CORS_ORIGIN}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    expose:
      - "3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
